name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Delete any stale draft releases for this tag (from previous failed runs)
          gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name == \"$TAG\" and .draft) | .id" | while read -r id; do
            echo "Deleting stale draft release (ID: $id)"
            gh api "repos/$REPO/releases/$id" --method DELETE
          done

          gh release create "$TAG" --repo "$REPO" --draft --title "Shoulders $TAG" --notes "Download the installer for your platform below."

  build:
    needs: create-release
    if: ${{ !failure() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --bundles dmg,app'
            rust-target: aarch64-apple-darwin
            label: macOS-ARM
          - platform: macos-latest
            args: '--target x86_64-apple-darwin --bundles dmg,app'
            rust-target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
            label: Linux
          - platform: windows-latest
            args: ''
            rust-target: ''
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.rust-target }}

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Debug Apple signing secrets
        if: runner.os == 'macOS'
        run: |
          echo "APPLE_CERTIFICATE length: ${#APPLE_CERTIFICATE}"
          echo "APPLE_CERTIFICATE_PASSWORD set: $( [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && echo yes || echo no )"
          echo "APPLE_SIGNING_IDENTITY: $APPLE_SIGNING_IDENTITY"
          echo "APPLE_ID set: $( [ -n "$APPLE_ID" ] && echo yes || echo no )"
          echo "APPLE_PASSWORD set: $( [ -n "$APPLE_PASSWORD" ] && echo yes || echo no )"
          echo "APPLE_TEAM_ID: $APPLE_TEAM_ID"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # CI build (no release)
      - name: Build Tauri app
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.label }}
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
            src-tauri/target/release/bundle/msi/
            src-tauri/target/release/bundle/nsis/
          if-no-files-found: warn

      # Release build — creates draft GitHub Release with installers
      - name: Build and release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bunx tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Shoulders ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

  # After all builds finish: publish the draft and delete the previous release
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false

      - name: Delete previous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Find the first published (non-draft) release that isn't the one we just published
          PREV=$(gh api "repos/$REPO/releases" --jq "[.[] | select(.draft == false and .tag_name != \"$CURRENT\")] | .[0].tag_name // empty")
          if [ -n "$PREV" ]; then
            echo "Deleting previous release: $PREV"
            gh release delete "$PREV" --repo "$REPO" --yes
            # Clean up the git tag (may already be gone)
            gh api "repos/$REPO/git/refs/tags/$PREV" --method DELETE 2>/dev/null || true
          else
            echo "No previous release found, skipping"
          fi

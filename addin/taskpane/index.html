<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoulders</title>
  <link rel="stylesheet" href="taskpane.css" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
        </svg>
        <span>Shoulders</span>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <main>
      <div id="fileInfo" class="file-info hidden">
        <div class="file-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
          </svg>
          <span id="fileName">—</span>
        </div>
      </div>

      <div id="statusMessage" class="status-message">
        Connecting to Shoulders...
      </div>

      <div id="actionSection" class="section hidden">
        <div class="section-header">
          <span>Activity</span>
          <button id="clearActionsBtn" class="clear-btn">Clear</button>
        </div>
        <div id="actionFeed" class="action-feed"></div>
      </div>

      <div id="disconnectedInfo" class="disconnected-info hidden">
        <p>Make sure the Shoulders app is running and Word Bridge is enabled.</p>
        <button id="retryBtn" class="retry-btn">Retry Connection</button>
      </div>
    </main>

    <footer>
      <span class="version">Word Bridge v0.1</span>
    </footer>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
